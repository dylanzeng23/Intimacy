<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0f1e">
  <title>Daily Log</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="header">
    <button id="header-back" class="header-btn hidden" aria-label="Back">&#8592;</button>
    <h1 id="header-title">Daily Log</h1>
    <button id="header-action" class="header-btn hidden" aria-label="Action"></button>
  </header>

  <main id="app"></main>

  <button id="fab" class="fab hidden" aria-label="Add entry">+</button>

  <nav id="tab-bar">
    <button class="tab" data-tab="calendar">
      <span class="tab-icon">&#128197;</span>
      <span class="tab-label">Calendar</span>
    </button>
    <button class="tab active" data-tab="log">
      <span class="tab-icon">&#10035;</span>
      <span class="tab-label">Log</span>
    </button>
    <button class="tab" data-tab="stats">
      <span class="tab-icon">&#128202;</span>
      <span class="tab-label">Stats</span>
    </button>
    <button class="tab" data-tab="settings">
      <span class="tab-icon">&#9881;</span>
      <span class="tab-label">Settings</span>
    </button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
